name: Deploy to EC2 (Docker)

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: future-ai-hr
  CONTAINER_NAME: future-ai-hr

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          MISSING=0
          for SECRET in EC2_HOST EC2_USER EC2_SSH_KEY VOLCENGINE_API_KEY VOLCENGINE_MODEL_ID NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!SECRET}" ]; then
              echo "::error::Secret $SECRET is missing!"
              MISSING=1
            fi
          done
          if [ $MISSING -eq 1 ]; then
            exit 1
          fi
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          VOLCENGINE_API_KEY: ${{ secrets.VOLCENGINE_API_KEY }}
          VOLCENGINE_MODEL_ID: ${{ secrets.VOLCENGINE_MODEL_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
            -t ${{ env.IMAGE_NAME }}:latest .

      - name: Save and transfer image
        run: |
          # 写入 SSH 密钥
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # 压缩并传输镜像 (合并为单行避免转义问题)
          docker save ${{ env.IMAGE_NAME }}:latest | gzip | ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cat > ~/image.tar.gz"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY'
            docker load < ~/image.tar.gz
            docker stop future-ai-hr 2>/dev/null || true
            docker rm future-ai-hr 2>/dev/null || true
            docker run -d \
              --name future-ai-hr \
              --restart unless-stopped \
              -p 51984:3000 \
              -e VOLCENGINE_API_KEY=${{ secrets.VOLCENGINE_API_KEY }} \
              -e VOLCENGINE_MODEL_ID=${{ secrets.VOLCENGINE_MODEL_ID }} \
              -e VOLCENGINE_EMBEDDING_MODEL_ID=${{ secrets.VOLCENGINE_EMBEDDING_MODEL_ID }} \
              -e NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              -e NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              -e SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
              future-ai-hr:latest
            rm -f ~/image.tar.gz
            docker image prune -f
          DEPLOY
